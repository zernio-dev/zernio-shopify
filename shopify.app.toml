# Learn more: https://shopify.dev/docs/apps/build/cli-for-apps/app-configuration
name = "Zernio"
client_id = "ee20ee832fea8bfbc7fe61e1c960b935"
application_url = "https://store.zernio.com"
embedded = true

[auth]
redirect_urls = [
  "https://store.zernio.com/auth/callback",
  "https://store.zernio.com/auth/shopify/callback",
]

[access_scopes]
# read_products: browse products + fetch product detail for compose/auto-post.
# read_inventory: detect 0 → >0 transitions for the back-in-stock trigger.
scopes = "read_products,read_inventory"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes-update"

  # Product lifecycle webhooks for auto-posting
  [[webhooks.subscriptions]]
  topics = ["products/create", "products/update", "products/delete"]
  uri = "/webhooks/products"

  # Inventory levels for the back-in-stock trigger. Fires whenever a
  # variant's available count changes at any location. Handler compares
  # to InventorySnapshot and auto-publishes on 0 → >0 transitions.
  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks/inventory"

  # Mandatory GDPR compliance webhooks
  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
